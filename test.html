<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fake Edge URL Bar Above Keyboard</title>

<style>

body{
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
}

button { padding:12px 18px; font-size:16px; margin-right:10px; }
textarea { width:100%; height:80px; font-size:18px; margin-top:20px; }

/* container */
.fake-bar{
  display:flex;
  justify-content:center;
  position:fixed;
  width:100%;
  z-index:9999;
  bottom:0;
  opacity:0;
  visibility:hidden;
  transition:opacity .25s ease, bottom .2s ease;
}

.fake-bar.show{
  opacity:1;
  visibility:visible;
}

/* edge style bar */
.edge-bar{
  display:flex;
  align-items:center;
  background:#2b2b2b;
  color:#e6e6e6;
  border-radius:28px;
  padding:10px 14px;
  width:92%;
  max-width:650px;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
}

/* icons */
.edge-icon{
  width:24px;
  height:24px;
  margin-right:8px;
}

.lock{
  font-size:14px;
  opacity:.8;
  margin-right:6px;
}

.url{
  flex:1;
  font-size:15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.refresh{
  font-size:18px;
  opacity:.85;
}

</style>
</head>
<body>

<button id="showBtn">Show Keyboard</button>
<textarea id="ta" placeholder="Textarea for forced focus…"></textarea>


<div class="fake-bar" id="fakeBar">

  <div class="edge-bar">

    <img class="edge-icon"
    src="https://upload.wikimedia.org/wikipedia/commons/9/98/Microsoft_Edge_logo_%282019%29.svg">

    <span class="lock">🔒</span>

    <span class="url">google.com</span>

    <span class="refresh">⟳</span>

  </div>

</div>


<script>

const fakeBar = document.getElementById('fakeBar');
const ta = document.getElementById('ta');

function adjustFakeBar(){
  const vv = window.visualViewport;
  let keyboardHeight = 0;

  if(vv){
    keyboardHeight = window.innerHeight - vv.height - vv.offsetTop;
  }

  fakeBar.style.bottom = keyboardHeight + 'px';
}

function showFakeBar(){
  fakeBar.classList.add('show');
  adjustFakeBar();
}

function hideFakeBar(){
  fakeBar.classList.remove('show');
}

if('visualViewport' in window){
  window.visualViewport.addEventListener('resize', ()=>{
    if(document.activeElement === ta) adjustFakeBar();
  });
}

window.addEventListener('orientationchange', adjustFakeBar);

document.getElementById("showBtn").onclick = async () => {

  ta.focus();

  try{
    await document.documentElement.requestFullscreen();
    setTimeout(()=>{document.exitFullscreen().catch(()=>{});},120);
  }catch(e){}

  setTimeout(async()=>{

    if(navigator.virtualKeyboard?.show){
      try{
        await navigator.virtualKeyboard.show();
      }catch(e){}
    }

    showFakeBar();

  },150);

};

ta.addEventListener('blur', hideFakeBar);

</script>

</body>
</html>
